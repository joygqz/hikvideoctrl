<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海康威视视频控制库示例</title>
    <script src="./codebase/webVideoCtrl.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        margin: 0;
        padding: 16px;
        color: #222;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 12px;
        text-align: center;
      }
      h2 {
        font-size: 1.1rem;
        margin: 18px 0 8px 0;
      }
      label, input, select, button {
        font-size: 14px;
      }
      input, select {
        padding: 2px 6px;
        margin: 2px 4px 2px 0;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      button {
        padding: 4px 12px;
        margin: 2px 2px;
        border: none;
        border-radius: 3px;
        background: #4f8cff;
        color: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      button:hover:not(:disabled) {
        background: #2563eb;
      }
      .ptz-table {
        border-collapse: collapse;
        margin-bottom: 6px;
        text-align: center;
      }
      .ptz-table td {
        padding: 2px;
      }
      #videoContainer {
        width: 100%;
        max-width: 800px;
        height: 320px;
        background: #000;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      textarea {
        width: 100%;
        max-width: 800px;
        height: 120px;
        font-size: 12px;
        border-radius: 3px;
        border: 1px solid #ccc;
        margin-bottom: 4px;
        padding: 4px;
        background: #fff;
        color: #333;
        resize: vertical;
      }
      hr {
        margin: 16px 0;
        border: none;
        border-top: 1px solid #e0e0e0;
      }
      div {
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div style="position: relative;">
      <h1>海康威视视频控制库示例</h1>
      <a href="https://github.com/joygqz/hikvideoctrl" target="_blank" rel="noopener" id="github-link" style="position: absolute; top: 0; right: 0; text-decoration: none; background: #fff; border-radius: 4px; border: 1px solid #e0e0e0; padding: 4px 10px; margin: 8px 12px; font-size: 13px; color: #222; box-shadow: 0 1px 4px rgba(0,0,0,0.04); transition: background 0.2s; z-index: 10;">GitHub</a>
    </div>

    <div>
      <h2>设备登录</h2>
      <label>设备 IP: <input type="text" id="deviceIP" value="192.168.1.100"></label><br>
      <label>端口: <input type="number" id="devicePort" value="80"></label><br>
      <label>用户名: <input type="text" id="username" value="admin"></label><br>
      <label>密码: <input type="password" id="password"></label><br>
      <button onclick="connectDevice()" id="connectBtn">连接设备</button>
      <button onclick="disconnectDevice()" id="disconnectBtn" disabled>断开连接</button>
    </div>

    <hr>

    <div>
      <h2>视频播放窗口</h2>
      <div id="videoContainer" style="width: 800px; height: 600px; background: #000; border: 1px solid #ccc;"></div>
    </div>

    <hr>

    <div>
      <h2>视频控制</h2>
      <label>通道号: <input type="number" id="channelId" value="1" min="1" max="64"></label>
      <label>码流类型:
        <select id="streamType">
          <option value="1">主码流</option>
          <option value="2">子码流</option>
        </select>
      </label><br>
      <button onclick="startPreview()" id="previewBtn" disabled>开始预览</button>
      <button onclick="stopPreview()" id="stopBtn" disabled>停止预览</button>
    </div>

    <hr>

    <div>
      <h2>PTZ 云台控制</h2>
      <table class="ptz-table">
        <tr>
          <td><button onclick="ptzControl('up-left')">↖</button></td>
          <td><button onclick="ptzControl('up')">↑</button></td>
          <td><button onclick="ptzControl('up-right')">↗</button></td>
        </tr>
        <tr>
          <td><button onclick="ptzControl('left')">←</button></td>
          <td><button onclick="ptzControl('stop')">停止</button></td>
          <td><button onclick="ptzControl('right')">→</button></td>
        </tr>
        <tr>
          <td><button onclick="ptzControl('down-left')">↙</button></td>
          <td><button onclick="ptzControl('down')">↓</button></td>
          <td><button onclick="ptzControl('down-right')">↘</button></td>
        </tr>
      </table>
      <button onclick="ptzControl('zoom-in')">放大</button>
      <button onclick="ptzControl('zoom-out')">缩小</button>
    </div>

    <hr>

    <div>
      <h2>录像与抓拍</h2>
      <button onclick="captureImage()">抓拍图片</button>
      <button onclick="startRecord()">开始录像</button>
      <button onclick="stopRecord()">停止录像</button>
    </div>

    <hr>

    <div>
      <h2>预置位</h2>
      <label>预置位号 (1-255): <input type="number" id="presetNumber" value="1" min="1" max="255"></label><br>
      <button onclick="setPreset()">设置预置位</button>
      <button onclick="gotoPreset()">调用预置位</button>
    </div>

    <hr>

    <div>
      <h2>操作日志</h2>
      <textarea id="logOutput" readonly style="width: 800px; height: 200px;"></textarea><br>
      <button onclick="clearLog()">清空日志</button>
    </div>

    <script type="module">
      import { createHikPlayer, PTZ_COMMAND, STREAM_TYPE } from '../dist/index.js'

      // 全局状态
      let player = null
      let currentDeviceId = null
      let isConnected = false
      let isPlaying = false
      let lastPtzAction = null

      // 初始化播放器
      function initPlayer() {
        player = createHikPlayer()

        player.on('device:connected', (device) => {
          log(`设备连接成功: ${device.host}:${device.port}`)
          updateConnectionStatus(true)
          enableControls(true)
        })

        player.on('device:disconnected', ({ deviceId }) => {
          log(`设备已断开: ${deviceId}`)
          updateConnectionStatus(false)
          updatePlayStatus(false)
          enableControls(false)
        })

        player.on('preview:started', ({ deviceId, channel, windowIndex }) => {
          log(`开始预览 - 设备: ${deviceId}, 通道: ${channel}, 窗口: ${windowIndex}`)
          updatePlayStatus(true)
        })

        player.on('preview:stopped', ({ deviceId, windowIndex }) => {
          log(`停止预览 - 设备: ${deviceId}, 窗口: ${windowIndex}`)
          updatePlayStatus(false)
        })

        player.on('recording:started', ({ fileName, windowIndex }) => {
          log(`开始录像: ${fileName} (窗口 ${windowIndex})`)
        })

        player.on('recording:stopped', ({ windowIndex }) => {
          log(`停止录像 (窗口 ${windowIndex})`)
        })

        player.on('capture:completed', ({ fileName, windowIndex, asFile }) => {
          log(`抓拍完成: ${fileName} (窗口 ${windowIndex}, ${asFile ? '已下载' : '回调数据'})`)
        })

        player.on('plugin:error', ({ windowIndex, errorCode, error }) => {
          log(`插件错误 [窗口 ${windowIndex}, 错误码 ${errorCode}]: ${error?.message ?? error}`)
        })

        log('播放器初始化完成')
      }

      // 连接设备
      window.connectDevice = async function () {
        const host = document.getElementById('deviceIP').value.trim()
        const port = Number.parseInt(document.getElementById('devicePort').value, 10)
        const username = document.getElementById('username').value.trim()
        const password = document.getElementById('password').value.trim()

        if (!host || !port || !username || !password) {
          log('请填写完整的设备信息')
          return
        }

        try {
          if (!player.supportsNoPlugin()) {
            log('当前浏览器不支持无插件模式（需 Chromium ≥ 91）')
            return
          }

          if (!player.isInitialized) {
            log('正在初始化插件...')
            await player.init({
              container: 'videoContainer',
              width: '100%',
              height: '100%',
              layout: 1,
              onWindowSelect: (index) => {
                log(`选中窗口: ${index}`)
              },
              onError: (windowIndex, errorCode, error) => {
                log(`插件错误 [窗口 ${windowIndex}, 错误码 ${errorCode}]: ${error}`)
              },
            })
            log('插件初始化完成')
          }

          log('正在登录设备...')
          const device = await player.login({
            host,
            port,
            username,
            password,
            protocol: 'http',
          })

          currentDeviceId = device.id
          log(`设备 ID: ${currentDeviceId}`)

          try {
            const info = await player.getDeviceInfo(currentDeviceId)
            if (info)
              log(`设备名称: ${info.deviceName}, 型号: ${info.model}, 序列号: ${info.serialNumber}`)

            const channels = await player.getChannels(currentDeviceId)
            log(`共 ${channels.length} 个通道`)
            channels.forEach((ch) => {
              log(`  - 通道 ${ch.id}: ${ch.name} [${ch.kind}] ${ch.online ? '在线' : '离线'}`)
            })
          }
          catch (err) {
            log(`获取设备信息失败: ${err.message}`)
          }
        }
        catch (error) {
          log(`连接失败: ${error.message}`)
          console.error(error)
        }
      }

      // 断开设备
      window.disconnectDevice = async function () {
        try {
          if (isPlaying)
            await player.stop(0)
          await player.logout(currentDeviceId)
          currentDeviceId = null
        }
        catch (error) {
          log(`断开连接失败: ${error.message}`)
        }
      }

      // 开始预览
      window.startPreview = async function () {
        if (!currentDeviceId || !isConnected) {
          log('请先连接设备')
          return
        }

        try {
          const channel = Number.parseInt(document.getElementById('channelId').value, 10)
          const streamType = Number.parseInt(document.getElementById('streamType').value, 10)

          log(`正在加载视频流 - 通道 ${channel}, 码流类型 ${streamType === STREAM_TYPE.Main ? '主码流' : '子码流'}...`)

          await player.startPreview(currentDeviceId, {
            channel,
            streamType,
            windowIndex: 0,
          })
        }
        catch (error) {
          log(`开始预览失败: ${error.message}`)
          console.error(error)
        }
      }

      // 停止预览
      window.stopPreview = async function () {
        try {
          await player.stop(0)
        }
        catch (error) {
          log(`停止预览失败: ${error.message}`)
        }
      }

      // PTZ 控制
      window.ptzControl = async function (direction) {
        if (!currentDeviceId || !isConnected) {
          log('请先连接设备')
          return
        }

        const commandMap = {
          'up': PTZ_COMMAND.Up,
          'down': PTZ_COMMAND.Down,
          'left': PTZ_COMMAND.Left,
          'right': PTZ_COMMAND.Right,
          'up-left': PTZ_COMMAND.UpLeft,
          'up-right': PTZ_COMMAND.UpRight,
          'down-left': PTZ_COMMAND.DownLeft,
          'down-right': PTZ_COMMAND.DownRight,
          'zoom-in': PTZ_COMMAND.ZoomIn,
          'zoom-out': PTZ_COMMAND.ZoomOut,
        }

        try {
          if (direction === 'stop') {
            const action = lastPtzAction ?? PTZ_COMMAND.Up
            await player.ptzStop(action, 0)
            lastPtzAction = null
            log('PTZ 控制: 停止')
            return
          }

          const action = commandMap[direction]
          if (action === undefined)
            return

          lastPtzAction = action
          await player.ptzStart({
            action,
            speed: 5,
            windowIndex: 0,
          })
          log(`PTZ 控制: ${direction}`)

          setTimeout(async () => {
            try {
              await player.ptzStop(action, 0)
              log('PTZ 控制: 自动停止')
            }
            catch (err) {
              console.error('停止 PTZ 失败:', err)
            }
          }, 2000)
        }
        catch (error) {
          log(`PTZ 控制失败: ${error.message}`)
        }
      }

      // 抓拍图片
      window.captureImage = async function () {
        if (!isPlaying) {
          log('请先开始预览')
          return
        }

        try {
          const fileName = await player.capture({
            windowIndex: 0,
            fileName: `capture_${Date.now()}.jpg`,
          })
          log(`图片抓拍成功: ${fileName}`)
        }
        catch (error) {
          log(`图片抓拍失败: ${error.message}`)
        }
      }

      // 开始录像
      window.startRecord = async function () {
        if (!isPlaying) {
          log('请先开始预览')
          return
        }

        try {
          const fileName = await player.startRecording({
            windowIndex: 0,
            fileName: `record_${Date.now()}`,
            byDateDirectory: true,
          })
          log(`开始录像: ${fileName}`)
        }
        catch (error) {
          log(`开始录像失败: ${error.message}`)
        }
      }

      // 停止录像
      window.stopRecord = async function () {
        try {
          await player.stopRecording(0)
        }
        catch (error) {
          log(`停止录像失败: ${error.message}`)
        }
      }

      // 设置预置位
      window.setPreset = async function () {
        if (!isConnected) {
          log('请先连接设备')
          return
        }

        const presetNumber = Number.parseInt(document.getElementById('presetNumber').value, 10)

        try {
          await player.setPreset(presetNumber, 0)
          log(`预置位 ${presetNumber} 设置成功`)
        }
        catch (error) {
          log(`设置预置位失败: ${error.message}`)
        }
      }

      // 调用预置位
      window.gotoPreset = async function () {
        if (!isConnected) {
          log('请先连接设备')
          return
        }

        const presetNumber = Number.parseInt(document.getElementById('presetNumber').value, 10)

        try {
          await player.goPreset(presetNumber, 0)
          log(`已调用预置位 ${presetNumber}`)
        }
        catch (error) {
          log(`调用预置位失败: ${error.message}`)
        }
      }

      // 日志函数
      function log(message) {
        const logOutput = document.getElementById('logOutput')
        const timestamp = new Date().toLocaleTimeString()
        logOutput.value += `[${timestamp}] ${message}\n`
        logOutput.scrollTop = logOutput.scrollHeight
        console.log(message)
      }

      // 清空日志
      window.clearLog = function () {
        document.getElementById('logOutput').value = ''
        log('日志已清空')
      }

      function updateConnectionStatus(connected) {
        isConnected = connected
        document.getElementById('connectBtn').disabled = connected
        document.getElementById('disconnectBtn').disabled = !connected
      }

      function updatePlayStatus(playing) {
        isPlaying = playing
        document.getElementById('previewBtn').disabled = !isConnected || playing
        document.getElementById('stopBtn').disabled = !playing
      }

      function enableControls(enabled) {
        document.getElementById('previewBtn').disabled = !enabled
      }

      // 页面加载完成后初始化
      document.addEventListener('DOMContentLoaded', () => {
        initPlayer()
        log('页面加载完成，准备就绪')
      })

      // 页面卸载时清理资源
      window.addEventListener('beforeunload', () => {
        if (player && currentDeviceId && isConnected)
          player.logout(currentDeviceId).catch(console.error)
      })
    </script>
  </body>
</html>
